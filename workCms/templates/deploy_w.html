<!DOCTYPE html>
<body lang="en">
<head>
    <meta charset="UTF-8">
    <title>维护详情记录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script type="text/javascript" src="{{ url_for('static', filename='js/jquery-3.6.1.min.js') }}"></script>
</head>

 
<body>
    <br \>
      <form class="#">
        <div class="#">
          <label>维护日期</label>
          <input id="date" name="deploy_date" type="text" class="form-control"  placeholder="2022/8/1">

          <label>维护时间</label>
          <input id="time" name="deploy_time" type="text" class="form-control"  placeholder="9:00-11:00">

          <label>维护详情</label>
          <textarea id="info" name="deploy_info" class="form-control" rows="3"></textarea>
          <label>维护人</label>
          <input id="deployName" name="deploy_name" type="text" class="form-control">

          <br><br>
          <button id="tj" class="btn btn-primary">提交记录</button>
          <input class="btn btn-warning" type="reset" value="重置">
          <a href="{{ url_for('deploy.deploy_zs') }}">
            <button type="button" class="btn btn-info">查看维护记录</button>
          </a>
        </div>
      </form>

    <script>

       $(function(){

            $("#tj").click(function(event){
                //拿到input标签值，一定是表单值
                var input_date = $("#date").val();
                var input_time = $("#time").val();
                var input_info = $("#info").val();
                var input_deployName = $("#deployName").val();
                if (input_date == '' || input_time == '' || input_info == '' || input_deployName == '') {
                  alert('字段不允许为空！')
                }else (
                  $.post({
                      "url": "/deploy_w_database",
                      "data": {
                          "date": input_date,
                          "time": input_time,
                          "info": input_info,
                          "deployName": input_deployName
                        },

                    }),

                  alert('数据提交成功！')

                );

            });
        });

    </script>
</body>
</html>
